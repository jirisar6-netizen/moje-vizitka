        }

            display: flex;

            padding: 20px 0;
        }
        .contact-info {
            width: calc(33.33% - 20px);
            margin: 10px;
            text-align: center;
        }
        .contact-info i {
            font-size: 24px;

            margin-bottom: 10px;
