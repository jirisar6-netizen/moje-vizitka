        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .animace {
            transition: opacity 2s, transform 2s;
        }

        .nadpis {
            font-size: 48px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            animation: animace 2s infinite;
        }

        @keyframes animace {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            50% {
                opacity: 1;
                transform: translateY(-20px);
            }
            100% {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        .kontakt {
            font-size: 24px;
            margin: 20px 0;
        }

        .kontakt a {
            text-decoration: none;
            color: #fff;
        }

        .kontakt a:hover {
            color: #ccc;
        }

        .kontakt i {
            font-style: italic;
        }

        .kontakt svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
    </style>
</head>
